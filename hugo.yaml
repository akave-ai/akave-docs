baseURL: https://docs.akave.xyz/
languageCode: en-us
title: Akave Docs
theme: hextra
enableGitInfo: true
params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/akave_logo.png
      dark: images/akave_logo.png
      link: /
      width: 78
      height: 42
  page:
    # full (100%), wide (90rem), normal (1280px)
    width: wide
  theme:
    # light | dark | system
    default: dark
    displayToggle: true
  # Display the last modification date
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
menu:
  main:
    - name: Search
      weight: 1
      params:
        type: search
    - name: GitHub
      weight: 2
      url: "https://github.com/akave-ai"
      params:
        icon: github
  sidebar:
    - name: "🔎 Blockchain Explorer ↗"
      url: "http://explorer.akave.ai/"
      weight: 20
    - name: "🚰 Testnet Faucet ↗"
      url: "https://faucet.akave.ai/"
      weight: 21